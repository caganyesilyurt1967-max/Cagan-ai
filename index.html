<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çağan AI | Gelişmiş Arayüz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-dark: #18181b;
            --border-color: #27272a;
            --accent-blue: #3b82f6;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --user-msg-bg: #27272a;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #main-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background: linear-gradient(180deg, #09090b 0%, #111113 100%);
        }

        /* Üst Bölüm */
        header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #3b82f6, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .model-selector {
            position: relative;
        }

        select {
            background: var(--card-dark);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Mesaj Alanı */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            position: relative;
        }

        .user-bubble {
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-bubble {
            background-color: rgba(59, 130, 246, 0.03);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .model-info {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Giriş Alanı */
        .input-box-container {
            padding: 25px;
            background: transparent;
        }

        .input-wrapper {
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        .send-button {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .dev-footer {
            text-align: center;
            padding-bottom: 15px;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Markdown benzeri kod blokları için ufak düzenleme */
        code {
            background: #2d2d2d;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div id="main-container">
    <header>
        <div class="logo">Çağan AI</div>
        <div class="model-selector">
            <select id="modelSelect">
                <option value="Gemini 1.5 Flash">Gemini 1.5 Flash</option>
                <option value="Claude 3.5 Sonnet">Claude 3.5 Sonnet</option>
                <option value="GPT-4o">GPT-4o</option>
            </select>
        </div>
    </header>

    <div id="chat-area">
        <div class="message-row ai-row">
            <span class="model-info"><i class="fas fa-robot"></i> Sistem</span>
            <div class="bubble ai-bubble">
                Merhaba Çağan. API bağlantıların hazır. İstediğin modeli seçip hemen sohbete başlayabilirsin.
            </div>
        </div>
    </div>

    <div class="input-box-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
            <button class="send-button" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="dev-footer">
        Geliştirici: <b>Çağan Yeşilyurt</b> | 2026
    </div>
</div>

<script>
    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        const selectedModel = modelSelect.value;

        // Kullanıcı mesajı
        const userHtml = `
            <div class="message-row user-row">
                <div class="bubble user-bubble">${text}</div>
            </div>`;
        chatArea.innerHTML += userHtml;
        
        // Input temizle ve kaydır
        userInput.value = "";
        chatArea.scrollTop = chatArea.scrollHeight;

        // Yükleniyor durumu
        const tempId = "ai-" + Date.now();
        const loadingHtml = `
            <div class="message-row ai-row" id="${tempId}">
                <span class="model-info"><i class="fas fa-sparkles"></i> ${selectedModel} yazıyor...</span>
                <div class="bubble ai-bubble">...</div>
            </div>`;
        chatArea.innerHTML += loadingHtml;
        chatArea.scrollTop = chatArea.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, model: selectedModel })
            });

            const data = await response.json();
            
            // Gerçek cevabı yerleştir
            document.getElementById(tempId).innerHTML = `
                <span class="model-info"><i class="fas fa-bolt"></i> ${selectedModel}</span>
                <div class="bubble ai-bubble">${data.text}</div>`;
        } catch (error) {
            document.getElementById(tempId).innerHTML = `
                <span class="model-info" style="color: #ef4444;">Hata</span>
                <div class="bubble ai-bubble">Bağlantı kurulamadı. Backend çalışıyor mu?</div>`;
        }
        
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Olay Dinleyiciler
    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleChat();
        }
    });
</script>

</body>
</html>
