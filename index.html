<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çağan AI - Chat Interface</title>
    <style>
        :root {
            --bg-color: #131314;
            --sidebar-color: #1e1f20;
            --text-color: #e3e3e3;
            --input-bg: #282a2d;
            --accent-color: #4b90ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Mesaj Alanı */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--input-bg);
            color: white;
        }

        .ai-message {
            align-self: flex-start;
            background-color: transparent;
            border-left: 3px solid var(--accent-color);
        }

        /* Input Alanı */
        .input-area {
            position: relative;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        #user-input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 10px;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-weight: bold;
        }

        .developer-tag {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="messages">
        <div class="message ai-message">
            Merhaba! Ben <b>Çağan AI</b>. Gemini, Claude ve GPT modelleriyle donatıldım. Bugün sana nasıl yardımcı olabilirim?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Çağan AI'a bir mesaj yazın..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
    
    <div class="developer-tag">Geliştirici: Çağan Yeşilyurt</div>
</div>

<script>
    const inputField = document.getElementById('user-input');
    const messageContainer = document.getElementById('messages');

    // Enter'a basınca gönder
    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    function sendMessage() {
        const text = inputField.value.trim();
        if (text === "") return;

        // Kullanıcı mesajını ekle
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.textContent = text;
        messageContainer.appendChild(userDiv);

        // Input'u temizle
        inputField.value = "";

        // Otomatik kaydır
        messageContainer.scrollTop = messageContainer.scrollHeight;

        // Yapay zeka cevabı simülasyonu
        setTimeout(() => {
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-message';
            aiDiv.innerHTML = "<b>Çağan AI:</b> Bu harika bir soru! Şu an modellerimi kontrol ediyorum...";
            messageContainer.appendChild(aiDiv);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }, 1000);
    }
</script>

</body>
</html>
