<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cagan AI - Editor</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --accent: #ffffff;
            --text-main: #e0e0e0;
            --border: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sol Menü: Model Seçimi */
        .sidebar {
            width: 260px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--accent); }

        select, button {
            background: #252525;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        /* Orta Alan: Kod Editörü */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        textarea {
            flex: 1;
            background: #000;
            color: #00ff00; /* Klasik terminal yeşili veya beyaz yapılabilir */
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            border: none;
            resize: none;
            outline: none;
            font-size: 14px;
        }

        /* Sağ Alan: Önizleme */
        .preview-container {
            flex: 1;
            background: #fff; /* Web sitesi önizlemesi genelde beyazdır */
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            background: var(--panel-bg);
            padding: 10px;
            color: gray;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            height: 30px;
            background: #111;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 12px;
            padding: 5px 20px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Antigravity Panel</h2>
        
        <label>Model Seçin:</label>
        <select id="modelSelect">
            <option>Gemini 3.1 Pro (High)</option>
            <option>Gemini 3.1 Pro (Low)</option>
            <option selected>Gemini 3 Flash</option>
            <option>Claude Sonnet 4.6</option>
            <option>Claude Opus 4.6</option>
            <option>GPT-OSS 120B</option>
        </select>

        <button onclick="runCode()">Kodu Çalıştır (Ctrl + L)</button>
        <p style="font-size: 11px; color: #666;">Cagan AI v1.0 - Geliştirici Modu</p>
    </div>

    <div class="editor-container">
        <div class="preview-header" style="background: #111; color: white;">index.html - Düzenleyici</div>
        <textarea id="codeInput" placeholder="HTML kodunuzu buraya yazın..."><h1>Merhaba!</h1>
<p>Modeli değiştirerek tasarıma devam et.</p>
        </textarea>
    </div>

    <div class="preview-container">
        <div class="preview-header">Canlı Önizleme</div>
        <iframe id="preview"></iframe>
    </div>

    <div class="footer">
        main* | 0 Uyarı | UTF-8 | Antigravity - Settings
    </div>

    <script>
        function runCode() {
            const code = document.getElementById('codeInput').value;
            const preview = document.getElementById('preview').contentWindow.document;
            preview.open();
            preview.write(code);
            preview.close();
        }

        // İlk açılışta kodu çalıştır
        window.onload = runCode;

        // Kısayol tuşu: Ctrl + L (Görseldeki gibi)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                runCode();
            }
        });
    </script>
</body>
</html>
