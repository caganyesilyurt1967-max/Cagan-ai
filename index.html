<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çağan AI | Premium</title>
    <style>
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            background-color: #0e0e10;
            color: #e3e3e3;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Üst Bar ve Model Seçici */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .brand { font-weight: bold; font-size: 1.2rem; color: #4b90ff; }

        select {
            background: #1e1f20;
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        /* Mesaj Alanı */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .msg-row { display: flex; flex-direction: column; }
        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 15px;
        }

        .user-bubble {
            background: #2b2d31;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .ai-bubble {
            background: rgba(75, 144, 255, 0.05);
            border: 1px solid rgba(75, 144, 255, 0.2);
            border-bottom-left-radius: 4px;
        }

        .model-tag {
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #888;
            letter-spacing: 1px;
        }

        /* Input Alanı (Gemini Style) */
        .input-container {
            background: #1e1f20;
            border-radius: 30px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            margin-top: 20px;
            border: 1px solid #333;
        }

        .input-container:focus-within { border-color: #4b90ff; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: #4b90ff;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover { transform: scale(1.1); background: #357ae8; }

        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div class="brand">Çağan AI</div>
        <select id="model-select">
            <option value="Gemini 1.5 Pro">Gemini 1.5 Pro</option>
            <option value="Claude 3.5 Sonnet">Claude 3.5 Sonnet</option>
            <option value="GPT-4o">GPT-4o</option>
        </select>
    </div>

    <div id="chat-window">
        <div class="msg-row ai-row">
            <span class="model-tag">Sistem</span>
            <div class="bubble ai-bubble">
                Selam Çağan! Hangi modeli kullanmak istersin? İstediğin her şeyi sorabilirsin.
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="main-input" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
        <button class="send-btn" id="send-trigger">➤</button>
    </div>

    <div class="footer-info">
        Geliştirici: Çağan Yeşilyurt | 2026
    </div>
</div>

<script>
    const input = document.getElementById('main-input');
    const button = document.getElementById('send-trigger');
    const chatWindow = document.getElementById('chat-window');
    const modelSelect = document.getElementById('model-select');

    function handleSend() {
        const text = input.value.trim();
        if (text === "") return;

        const currentModel = modelSelect.value;

        // Kullanıcı Mesajı
        const userHTML = `
            <div class="msg-row user-row">
                <div class="bubble user-bubble">${text}</div>
            </div>`;
        chatWindow.innerHTML += userHTML;

        input.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Yapay Zeka Cevabı (Simülasyon)
        setTimeout(() => {
            const aiHTML = `
                <div class="msg-row ai-row">
                    <span class="model-tag">${currentModel}</span>
                    <div class="bubble ai-bubble">
                        ${currentModel} kullanılarak cevap üretiliyor... Bu gerçekten ilginç bir fikir!
                    </div>
                </div>`;
            chatWindow.innerHTML += aiHTML;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 800);
    }

    // Tıklama Olayı
    button.addEventListener('click', handleSend);

    // Enter Tuşu Olayı (Kesin Çözüm)
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // Sayfa yenilenmesini engelle
            handleSend();
        }
    });
</script>

</body>
</html>
